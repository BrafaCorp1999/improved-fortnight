name: Build iOS IPA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'  # Puedes ajustar la versión de Flutter aquí si es necesario

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios
          pod install

      - name: Build the app
        run: |
          flutter build ios --release --no-codesign

      - name: Export IPA
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -archivePath $PWD/build/Runner.xcarchive archive
          xcodebuild -exportArchive -archivePath $PWD/build/Runner.xcarchive -exportOptionsPlist $PWD/ExportOptions.plist -exportPath $PWD/build/ipa

      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v2
        with:
          name: ipa
          path: ios/build/ipa/Runner.ipa
