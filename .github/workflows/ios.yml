name: Build Flutter iOS App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    # Paso 1: Checkout del código
    - name: Checkout code
      uses: actions/checkout@v3

    # Paso 2: Instalar Flutter 3.13.0
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.0'

    # Paso 3: Actualizar Dart SDK manualmente
    - name: Update Dart SDK
      run: |
        flutter upgrade
        flutter doctor

    # Paso 4: Limpiar caché de Flutter y Dart
    - name: Clean Flutter and Dart cache
      run: |
        flutter pub cache repair
        flutter clean

    # Paso 5: Verificar las versiones de Flutter y Dart SDK
    - name: Verify Flutter and Dart versions
      run: |
        flutter --version
        dart --version

    # Paso 6: Instalar dependencias de Flutter
    - name: Install dependencies
      run: |
        flutter pub get

    # Paso 7: Generar el archivo IPA
    - name: Build IPA
      run: |
        flutter build ios --release --no-codesign

    # Paso 8: Subir artefactos generados (IPA)
    - name: Upload IPA as an artifact
      uses: actions/upload-artifact@v4
      with:
        name: ipa-file
        path: build/ios/iphoneos/*.ipa
