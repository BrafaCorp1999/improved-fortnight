name: Build iOS App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    # Paso 1: Checkout del repositorio
    - name: Checkout repository
      uses: actions/checkout@v2

    # Paso 2: Configuración de Flutter
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.7.0'  # Especifica una versión estable de Flutter

    # Paso 3: Instalar dependencias
    - name: Install dependencies
      run: |
        flutter pub get  # Instalar todas las dependencias

    # Paso 4: Limpiar y configurar el Podfile (si no está hecho manualmente)
    - name: Clean and Configure Podfile
      run: |
        cd ios
        pod install

    # Paso 5: Build iOS (Generar el archivo IPA)
    - name: Build iOS app
      run: |
        flutter build ios --release --no-codesign

    # Paso 6: Empaquetar el archivo IPA
    - name: Package the IPA
      run: |
        mkdir -p build/ios/ipa
        cp -r ios/build/ios/iphoneos/Runner.app build/ios/ipa/
        cd build/ios/ipa
        zip -r Runner.ipa Runner.app

    # Paso 7: Subir el IPA como artefacto
    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v3.2.0
      with:
        name: Runner.ipa
        path: build/ios/ipa/Runner.ipa
