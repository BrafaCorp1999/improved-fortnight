name: Build iOS App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    # Paso 1: Checkout del repositorio
    - name: Checkout repository
      uses: actions/checkout@v2

    # Paso 2: Configuración de Flutter (usar una versión específica que sea compatible con Dart 3.5.3 o superior)
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.10.0'  # Aquí usamos la versión exacta de Flutter que es compatible con Dart >= 3.5.3

    # Paso 3: Instalar dependencias con Flutter
    - name: Install dependencies
      run: |
        flutter pub get  # Instalar todas las dependencias

    # Paso 4: Configurar y limpiar el Podfile
    - name: Clean and Configure Podfile
      run: |
        cd ios
        pod install  # Asegúrate de que todas las dependencias de CocoaPods estén instaladas correctamente

    # Paso 5: Generar el build iOS (IPA)
    - name: Build iOS app
      run: |
        flutter build ios --release --no-codesign  # Crear el build de iOS sin firmar

    # Paso 6: Empaquetar el archivo IPA
    - name: Package the IPA
      run: |
        mkdir -p build/ios/ipa  # Crear directorio para el IPA
        cp -r ios/build/ios/iphoneos/Runner.app build/ios/ipa/  # Copiar el app generado al directorio de IPA
        cd build/ios/ipa
        zip -r Runner.ipa Runner.app  # Comprimir la app en un archivo IPA

    # Paso 7: Subir el IPA como artefacto
    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v3
      with:
        name: Runner.ipa
        path: build/ios/ipa/Runner.ipa  # Subir el IPA generado para su distribución
